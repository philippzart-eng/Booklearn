<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="LearnBook">
<meta name="theme-color" content="#faf7f2">
<title>LearnBook</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf7f2;--bg2:#f3ede3;--bg3:#e8ddd0;
  --accent:#d97706;--accent2:#b45309;
  --text:#2c1a0e;--text2:#6b4c2a;--text3:#a8926a;
  --border:rgba(139,90,43,0.15);--border2:rgba(139,90,43,0.3);
  --green:#3b6d11;--green-bg:rgba(59,109,17,0.1);
  --red:#c0392b;--red-bg:rgba(192,57,43,0.08);
  --blue:#185FA5;--blue-bg:rgba(24,95,165,0.08);
  --r:14px;--rsm:10px;
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;overscroll-behavior:none}
body{display:flex;flex-direction:column}
#screen{flex:1;overflow-y:auto;padding:calc(var(--st)+14px) 15px 0;padding-bottom:calc(76px + var(--sb))}
.app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.logo{font-family:'Playfair Display',serif;font-size:21px;color:var(--accent)}.logo span{color:var(--text3);font-weight:400}
.hdr-btn{background:none;border:none;color:var(--text3);font-size:13px;font-family:'Source Sans 3',sans-serif;cursor:pointer;padding:4px 8px}
#bottomNav{position:fixed;bottom:0;left:0;right:0;background:rgba(250,247,242,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:8px 0 calc(8px + var(--sb));display:flex}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text3);font-size:10px;font-family:'Source Sans 3',sans-serif;cursor:pointer;padding:4px 0;transition:color .2s}
.nav-btn svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:var(--accent)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:11px}
.card-sm{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rsm);padding:11px 13px}
.sec-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:9px;font-weight:500}
/* Upload */
.upload-btn{border:1.5px dashed var(--border2);border-radius:var(--r);padding:28px 16px;text-align:center;cursor:pointer;width:100%;background:transparent;transition:background .2s;display:block}
.upload-btn:active{background:var(--bg2)}
.upload-btn svg{width:36px;height:36px;stroke:var(--accent);margin-bottom:10px;stroke-width:1.5}
.upload-btn h3{font-family:'Playfair Display',serif;font-size:17px;color:var(--text);margin-bottom:5px}
.upload-btn p{font-size:13px;color:var(--text2)}
/* Book rows */
.book-row{display:flex;align-items:center;gap:12px;padding:12px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rsm);margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.book-row:active{background:var(--bg3)}.book-row.active-book{border-color:var(--accent)}
.book-spine{width:40px;height:52px;border-radius:3px 7px 7px 3px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.book-spine svg{width:20px;height:20px;stroke:#fff;stroke-width:2;fill:none}
.book-row-info{flex:1;min-width:0}
.book-row-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-row-meta{font-size:11px;color:var(--text3);margin-top:2px}
.book-row-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;font-size:16px;flex-shrink:0}
/* Progress */
.prog-bar-wrap{height:4px;background:var(--bg3);border-radius:99px;margin-top:6px;overflow:hidden}
.prog-bar-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s;opacity:.85}
/* Learning path */
.path-wrap{display:flex;gap:0;margin-bottom:16px;overflow:hidden;border-radius:var(--rsm);border:1px solid var(--border)}
.path-step{flex:1;padding:10px 4px;text-align:center;cursor:pointer;transition:background .15s;position:relative;border-right:1px solid var(--border)}
.path-step:last-child{border-right:none}
.path-step.done{background:rgba(217,119,6,.08)}
.path-step.active{background:rgba(217,119,6,.15)}
.path-step.locked{opacity:.45;cursor:default}
.path-step-icon{font-size:18px;display:block;margin-bottom:2px}
.path-step-label{font-size:9px;color:var(--text3);line-height:1.2}
.path-step.active .path-step-label{color:var(--accent2);font-weight:500}
.path-step.done .path-step-label{color:var(--green)}
.path-check{position:absolute;top:4px;right:4px;font-size:9px;color:var(--green)}
/* Chapter list */
.chap-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rsm);margin-bottom:7px;cursor:pointer;transition:all .15s}
.chap-item:active{background:var(--bg3)}.chap-item.selected{border-color:var(--accent);background:rgba(217,119,6,.07)}
.chap-num{font-size:11px;color:var(--text3);min-width:20px;font-weight:500}
.chap-title{flex:1;font-size:13px;line-height:1.35}
.chap-item.selected .chap-title,.chap-item.selected .chap-num{color:var(--accent)}
.chap-prog{font-size:10px;color:var(--accent2);background:rgba(217,119,6,.12);border-radius:99px;padding:2px 7px;white-space:nowrap}
/* Buttons */
.btn-primary{width:100%;padding:14px;font-size:14px;font-weight:500;font-family:'Source Sans 3',sans-serif;background:var(--accent);color:#fff;border:none;border-radius:var(--rsm);cursor:pointer;transition:all .15s}
.btn-primary:active{transform:scale(.98)}.btn-primary:disabled{opacity:.4}
.btn-row{display:flex;gap:8px;margin-top:10px}
.btn-sec{flex:1;padding:10px;font-size:13px;font-family:'Source Sans 3',sans-serif;background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:var(--rsm);cursor:pointer}
.btn-sec:active{background:var(--bg3)}
.btn-acc{flex:1;padding:10px;font-size:13px;font-family:'Source Sans 3',sans-serif;background:rgba(217,119,6,.12);border:1px solid rgba(217,119,6,.35);color:var(--accent2);border-radius:var(--rsm);cursor:pointer}
.btn-acc:active{background:rgba(217,119,6,.2)}
.btn-green{flex:1;padding:10px;font-size:13px;font-family:'Source Sans 3',sans-serif;background:var(--green-bg);border:1px solid rgba(59,109,17,.3);color:var(--green);border-radius:var(--rsm);cursor:pointer}
.btn-red{flex:1;padding:10px;font-size:13px;font-family:'Source Sans 3',sans-serif;background:var(--red-bg);border:1px solid rgba(192,57,43,.3);color:var(--red);border-radius:var(--rsm);cursor:pointer}
.btn-blue{flex:1;padding:10px;font-size:13px;font-family:'Source Sans 3',sans-serif;background:var(--blue-bg);border:1px solid rgba(24,95,165,.3);color:var(--blue);border-radius:var(--rsm);cursor:pointer}
/* Count control */
.count-ctrl{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 14px;margin-bottom:11px}
.count-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;width:30px;height:30px;color:var(--text);font-size:18px;cursor:pointer;line-height:1;font-family:'Source Sans 3',sans-serif}
/* Output header */
.out-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:11px;border-bottom:1px solid var(--border)}
.out-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--text)}
.save-indicator{font-size:11px;color:var(--accent2);background:rgba(217,119,6,.12);border-radius:99px;padding:3px 9px}
/* Prose */
.prose{font-size:14px;line-height:1.9;color:var(--text2);white-space:pre-wrap;font-family:'Source Sans 3',sans-serif}
/* Phase intro card */
.phase-intro{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px;text-align:center}
.phase-intro-icon{font-size:36px;margin-bottom:10px}
.phase-intro-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);margin-bottom:8px}
.phase-intro-desc{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.phase-tip{background:rgba(217,119,6,.07);border:1px solid rgba(217,119,6,.2);border-radius:var(--rsm);padding:10px 13px;font-size:12px;color:var(--text2);line-height:1.5;text-align:left;margin-bottom:16px}
/* Flashcards SR */
.fc-sr{background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--r);padding:20px;text-align:center;min-height:180px;display:flex;flex-direction:column;justify-content:center;margin-bottom:12px;transition:all .2s}
.fc-front{font-size:16px;font-weight:500;color:var(--text);line-height:1.4;font-family:'Playfair Display',serif;margin-bottom:14px}
.fc-input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rsm);color:var(--text);font-size:14px;font-family:'Source Sans 3',sans-serif;resize:none;min-height:70px;margin-bottom:10px}
.fc-input::placeholder{color:var(--text3)}
.fc-reveal-btn{width:100%;padding:10px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rsm);font-size:13px;color:var(--text2);cursor:pointer;font-family:'Source Sans 3',sans-serif;margin-bottom:10px}
.fc-back{font-size:14px;color:var(--accent2);line-height:1.6;padding:12px;background:rgba(217,119,6,.07);border-radius:var(--rsm);margin-bottom:10px;text-align:left;display:none}
.fc-progress{font-size:12px;color:var(--text3);text-align:center;margin-bottom:10px}
.fc-sr-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
/* Classic fc */
.fc{background:var(--bg3);border-radius:var(--rsm);padding:14px;margin-bottom:9px;cursor:pointer;border:1px solid var(--border);transition:all .2s}
.fc:active{transform:scale(.98)}
.fc .front{font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px;font-family:'Playfair Display',serif}
.fc .hint{font-size:11px;color:var(--text3)}
.fc .back{font-size:13px;color:var(--accent2);margin-top:10px;padding-top:10px;border-top:1px solid var(--border2);display:none;line-height:1.6}
.fc.flip{border-color:var(--accent);background:rgba(217,119,6,.06)}.fc.flip .back{display:block}.fc.flip .hint{display:none}
/* Quiz */
.quiz-prog{font-size:12px;color:var(--text3);margin-bottom:13px}
.quiz-q{font-family:'Playfair Display',serif;font-size:15px;line-height:1.5;margin-bottom:12px}
.quiz-opt{width:100%;text-align:left;padding:11px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);margin-bottom:7px;font-size:13px;font-family:'Source Sans 3',sans-serif;color:var(--text);cursor:pointer;transition:all .15s}
.quiz-opt:active:not(:disabled){transform:scale(.98)}
.quiz-opt.correct{background:var(--green-bg);border-color:rgba(59,109,17,.4);color:var(--green)}
.quiz-opt.wrong{background:var(--red-bg);border-color:rgba(192,57,43,.4);color:var(--red)}
.quiz-nav{display:flex;gap:8px;margin-top:14px}
.quiz-nav button{flex:1;padding:11px;border:1px solid var(--border2);background:transparent;color:var(--text);border-radius:var(--rsm);font-family:'Source Sans 3',sans-serif;font-size:13px;cursor:pointer}
.quiz-nav button:active{background:var(--bg3)}
.quiz-result{text-align:center;padding:20px 0}
.quiz-score{font-size:48px;font-weight:600;font-family:'Playfair Display',serif;margin-bottom:4px}
.quiz-score-sub{font-size:13px;color:var(--text3);margin-bottom:20px}
/* Explain feedback */
.explain-area{width:100%;padding:12px;background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--rsm);color:var(--text);font-size:14px;font-family:'Source Sans 3',sans-serif;resize:none;min-height:120px;line-height:1.7}
.explain-area::placeholder{color:var(--text3)}
.feedback-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rsm);padding:14px;margin-top:12px}
.feedback-score{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.feedback-pips{display:flex;gap:4px}
.pip{width:20px;height:8px;border-radius:99px;background:var(--bg3)}
.pip.filled{background:var(--accent)}
/* Terms */
.term{padding:11px 13px;background:var(--bg2);border-radius:var(--rsm);margin-bottom:7px;border-left:3px solid var(--accent);border:1px solid var(--border);border-left:3px solid var(--accent)}
.term-name{font-size:14px;font-weight:500;color:var(--accent2);margin-bottom:3px}
.term-def{font-size:13px;color:var(--text2);line-height:1.5}
/* Timeline */
.tl-item{display:flex;gap:12px;margin-bottom:14px}
.tl-dot-col{display:flex;flex-direction:column;align-items:center}
.tl-dot{width:12px;height:12px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:3px;border:2px solid var(--bg)}
.tl-line{width:2px;flex:1;background:var(--border2);margin-top:4px}
.tl-date{font-size:11px;color:var(--accent2);font-weight:500;margin-bottom:2px}
.tl-event{font-size:13px;color:var(--text2);line-height:1.5}
/* Saved */
.saved-entry{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rsm);margin-bottom:7px;overflow:hidden}
.saved-entry-hdr{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer}
.saved-entry-hdr:active{background:var(--bg3)}
.saved-type-badge{font-size:10px;padding:2px 8px;border-radius:99px;white-space:nowrap}
.badge-preQuiz{background:rgba(24,95,165,.1);color:#185FA5}
.badge-summary{background:rgba(217,119,6,.1);color:#b45309}
.badge-flashcards{background:rgba(59,109,17,.1);color:#3b6d11}
.badge-quiz{background:rgba(139,90,43,.1);color:#6b4c2a}
.badge-explain{background:rgba(192,57,43,.08);color:#c0392b}
.badge-simple{background:rgba(217,119,6,.1);color:#b45309}
.badge-terms{background:rgba(217,119,6,.1);color:#b45309}
.badge-timeline{background:rgba(24,95,165,.1);color:#185FA5}
.badge-questions{background:rgba(192,57,43,.08);color:#c0392b}
.saved-entry-title{flex:1;font-size:13px;color:var(--text2);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.saved-entry-body{padding:0 13px 13px;border-top:1px solid var(--border);display:none}
.saved-entry-body.open{display:block;padding-top:12px}
.saved-del{background:none;border:none;color:var(--text3);font-size:15px;cursor:pointer;padding:4px}
/* Settings */
.setting-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:7px}
.setting-input{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rsm);color:var(--text);font-size:14px;font-family:'Source Sans 3',sans-serif}
.setting-input::placeholder{color:var(--text3)}
.key-ok{color:var(--green)}.key-err{color:var(--red)}
/* Loading / error */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 0;gap:14px}
.dots{display:flex;gap:7px}
.dots span{width:8px;height:8px;border-radius:50%;background:var(--accent2);animation:pu 1.2s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes pu{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}
.loading-txt{font-size:13px;color:var(--text3)}
.err-box{background:var(--red-bg);border:1px solid rgba(192,57,43,.25);border-radius:var(--rsm);padding:13px;font-size:13px;color:var(--red);line-height:1.5}
.empty-state{text-align:center;padding:50px 20px}
.empty-state svg{width:44px;height:44px;stroke:var(--text3);margin-bottom:14px;stroke-width:1}
.empty-state h3{font-family:'Playfair Display',serif;font-size:17px;color:var(--text2);margin-bottom:7px}
.empty-state p{font-size:13px;color:var(--text3);line-height:1.6}
.install-tip{background:rgba(217,119,6,.06);border:1px solid rgba(217,119,6,.2);border-radius:var(--rsm);padding:11px 13px;margin-bottom:14px;font-size:12px;color:var(--text2);line-height:1.5;display:flex;gap:9px;align-items:flex-start}
.install-tip svg{width:16px;height:16px;stroke:var(--accent);flex-shrink:0;margin-top:1px}
.tool-saved-dot{position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--green)}
</style>
</head>
<body>
<div id="screen"></div>
<nav id="bottomNav">
  <button class="nav-btn active" onclick="nav('library')" id="nb-library">
    <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Bücher
  </button>
  <button class="nav-btn" onclick="nav('learn')" id="nb-learn">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Lernen
  </button>
  <button class="nav-btn" onclick="nav('saved')" id="nb-saved">
    <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>Gespeichert
  </button>
  <button class="nav-btn" onclick="nav('settings')" id="nb-settings">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Einstellungen
  </button>
</nav>
<input type="file" id="fileInput" accept=".epub,application/epub+zip" multiple onchange="loadEpubs(event)" style="display:none">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ─── State ────────────────────────────────────────────
let books=[], activeBookId=null, activeChapIdx=null;
let currentView='library', currentPhase=0;
let saved={}, pendingEntry=null;
let countSetting={quiz:6,flashcards:8};
let savedViewBook=null, savedViewChap=null;
let fcCards=[], fcIdx=0, fcAgain=[];

// Learning path phases
const PHASES=[
  {id:'preQuiz',   emoji:'🔍', label:'Vorwissen',   desc:'Was weißt du schon?'},
  {id:'summary',   emoji:'📖', label:'Lesen',        desc:'Zusammenfassung & Konzepte'},
  {id:'flashcards',emoji:'🃏', label:'Karten',       desc:'Aktives Erinnern'},
  {id:'quiz',      emoji:'❓', label:'Quiz',         desc:'Wissen testen'},
  {id:'explain',   emoji:'✍️', label:'Erklären',    desc:'In eigenen Worten'},
];

const COLORS=[
  ['#b45309','#92400e'],['#185FA5','#0c447c'],['#be185d','#9d174d'],
  ['#3b6d11','#27500a'],['#6d28d9','#4c1d95'],['#c0392b','#922b21'],
];
let colorIdx=0;

function S(k,v){if(v===undefined){try{return JSON.parse(localStorage.getItem(k))}catch{return null}}else{localStorage.setItem(k,JSON.stringify(v))}}
function loadState(){saved=S('lb_saved')||{};colorIdx=S('lb_colorIdx')||0;activeBookId=S('lb_activeBook')||null;}
function saveState(){
  const bm=books.map(b=>({...b,chapters:b.chapters.map(c=>({title:c.title,words:c.words}))}));
  S('lb_books_meta',bm);S('lb_activeBook',activeBookId);S('lb_saved',saved);S('lb_colorIdx',colorIdx);
  books.forEach(b=>{try{S('lb_text_'+b.id,b.chapters.map(c=>c.text))}catch(e){}});
}
function loadFullBooks(){
  const meta=S('lb_books_meta')||[];
  books=meta.map(b=>{const t=S('lb_text_'+b.id)||[];return{...b,chapters:b.chapters.map((c,i)=>({...c,text:t[i]||''}))};});
  if(activeBookId&&!books.find(b=>b.id===activeBookId))activeBookId=books[0]?.id||null;
}

// ─── Progress helpers ─────────────────────────────────
function chapDonePhases(bookId,chapIdx){
  return PHASES.filter(p=>{
    const pfx=bookId+'_'+chapIdx+'_'+p.id;
    if(p.id==='quiz'||p.id==='flashcards')return Object.keys(saved).some(k=>k.startsWith(pfx+'_')||k===pfx);
    return !!saved[pfx];
  }).length;
}
function chapPct(bookId,chapIdx){return Math.round((chapDonePhases(bookId,chapIdx)/PHASES.length)*100);}
function bookPct(bookId){
  const b=books.find(x=>x.id===bookId);if(!b||!b.chapters.length)return 0;
  return Math.round(b.chapters.reduce((s,_,i)=>s+chapPct(bookId,i),0)/b.chapters.length);
}

function deleteBook(e,id){

// ─── Learn: path view ─────────────────────────────────
function renderLearn(){

  const ch=book.chapters[activeChapIdx];

  const pathHtml=PHASES.map((p,i)=>{
    const done=!!saved[activeBookId+'_'+activeChapIdx+'_'+p.id]||
      Object.keys(saved).some(k=>k.startsWith(activeBookId+'_'+activeChapIdx+'_'+p.id+'_'));
    const isActive=i===currentPhase;
    const isLocked=i>0&&!PHASES.slice(0,i).some((_,j)=>
      saved[activeBookId+'_'+activeChapIdx+'_'+PHASES[j].id]||
      Object.keys(saved).some(k=>k.startsWith(activeBookId+'_'+activeChapIdx+'_'+PHASES[j].id+'_'))
    )&&i>chapDonePhases(activeBookId,activeChapIdx);
    return `<div class="path-step ${done?'done':isActive?'active':''}" onclick="setPhase(${i})">
      ${done?'<span class="path-check">✓</span>':''}

  }).join('');

    </div>

  renderPhase();
}

{"score":4,"strengths":["...","..."],"gaps":["..."],"connections":"...","next":"..."}`);

      ${gaps?`<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:500;color:var(--red);margin-bottom:6px">△ Lücken & Ungenauigkeiten</div><ul style="font-size:13px;color:var(--text2);padding-left:16px;line-height:1.6">${gaps}</ul></div>`:''}
      ${f.connections?`<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:500;color:var(--blue);margin-bottom:6px">↔ Wichtige Verbindungen</div><div style="font-size:13px;color:var(--text2);line-height:1.6">${esc(f.connections)}</div></div>`:''}
      ${f.next?`<div style="background:rgba(217,119,6,.07);border-radius:var(--rsm);padding:10px 12px"><div style="font-size:12px;font-weight:500;color:var(--accent2);margin-bottom:4px">→ Nächster Schritt</div><div style="font-size:13px;color:var(--text2)">${esc(f.next)}</div></div>`:''}

// ─── Generate phases ──────────────────────────────────
async function generatePhase(phaseId){
  const key=localStorage.getItem('lb_apikey');
  if(!key){alert('API-Key fehlt.');nav('settings');return;}
  const book=books.find(b=>b.id===activeBookId);
  const ch=book.chapters[activeChapIdx];
  const text=ch.text.length>9000?ch.text.slice(0,9000)+'\n[…gekürzt]':ch.text;
  const nfc=countSetting.flashcards,nq=countSetting.quiz;

  // other chapter titles for context
  const otherChaps=book.chapters.filter((_,i)=>i!==activeChapIdx).slice(0,5).map(c=>c.title).join(', ');

  const prompts={
    preQuiz:`Erstelle exakt 4 Multiple-Choice-Fragen auf Deutsch die das VORWISSEN zu diesem Thema testen – bevor jemand das Kapitel gelesen hat. Fragen sollen allgemeines Wissen oder logisches Denken testen, nicht Details aus dem Kapitel.
Antworte AUSSCHLIESSLICH als JSON-Array ohne Backticks:
[{"question":"Frage","options":["A","B","C","D"],"correct":0,"explanation":"Kurze Erklärung der richtigen Antwort"}]
Kapitel: "${ch.title}"`,

    summary:`Erstelle eine lernoptimierte Zusammenfassung auf Deutsch mit folgender Struktur:

ÜBERBLICK (2-3 Sätze – das Wichtigste zuerst)

KERNAUSSAGEN
• ...

WICHTIGE PERSONEN / KONZEPTE

WARUM IST DAS WICHTIG?
(Bedeutung, Konsequenzen, Verbindungen zu anderen Themen)

ELABORATIONSFRAGEN – Denk darüber nach:
1. Warum war [Ereignis/Konzept] unvermeidlich/überraschend?
2. Was wäre anders gewesen, wenn...?
3. Welche Parallelen siehst du zu heute?

Kapitel: "${ch.title}"
Text: ${text}`,

    flashcards:`Erstelle exakt ${nfc} Lernkarteikarten auf Deutsch. Fokus auf Konzepte, Zusammenhänge und Kausalitäten – nicht nur Fakten. Antworte AUSSCHLIESSLICH als JSON-Array ohne Backticks:
[{"front":"Frage oder Begriff","back":"Ausführliche Antwort mit Kontext"}]
Kapitel: "${ch.title}"
Text: ${text}`,

    quiz:`Erstelle exakt ${nq} anspruchsvolle Multiple-Choice-Fragen auf Deutsch. Verknüpfe wo möglich mit diesen anderen Kapiteln: ${otherChaps||'keine'}. Fragen sollen Verständnis testen, nicht nur Auswendiglernen.
Antworte AUSSCHLIESSLICH als JSON-Array ohne Backticks:
[{"question":"Frage","options":["A","B","C","D"],"correct":0,"explanation":"Warum ist das die richtige Antwort"}]
Kapitel: "${ch.title}"
Text: ${text}`,
  };

  const area=document.getElementById('phaseArea');
  area.innerHTML=`<div class="loading-wrap"><div class="dots"><span></span><span></span><span></span></div><div class="loading-txt">Claude generiert…</div></div>`;

  try{
    const content=await callAPI(key,prompts[phaseId]);
    const entry={type:phaseId,raw:content,savedAt:new Date().toLocaleDateString('de-DE')};
    if(['preQuiz','flashcards','quiz'].includes(phaseId)){
      try{entry.parsed=JSON.parse(extractJson(content));}catch(e){entry.parsed=null;}
    }
    const sk=(['quiz','flashcards'].includes(phaseId))
      ?activeBookId+'_'+activeChapIdx+'_'+phaseId+'_'+Date.now()
      :activeBookId+'_'+activeChapIdx+'_'+phaseId;
    saved[sk]=entry;
    saveState();
    updateProgress();
    renderSavedPhase(phaseId,entry);
  }catch(e){
    area.innerHTML=`<div class="err-box">${esc(e.message)}</div>`;
  }
}

function updateProgress(){
  const pct=chapPct(activeBookId,activeChapIdx);
  const fill=document.querySelector('.prog-bar-fill');if(fill)fill.style.width=pct+'%';
  const ptxt=document.querySelector('.card-sm [style*="abgeschlossen"]');if(ptxt)ptxt.textContent=pct+'% abgeschlossen';
  // update path steps
  PHASES.forEach((p,i)=>{
    const step=document.querySelectorAll('.path-step')[i];if(!step)return;
    const done=!!saved[activeBookId+'_'+activeChapIdx+'_'+p.id]||
      Object.keys(saved).some(k=>k.startsWith(activeBookId+'_'+activeChapIdx+'_'+p.id+'_'));
    step.classList.toggle('done',done);step.classList.toggle('active',i===currentPhase&&!done);
    let chk=step.querySelector('.path-check');
    if(done&&!chk){chk=document.createElement('span');chk.className='path-check';chk.textContent='✓';step.prepend(chk);}
    else if(!done&&chk)chk.remove();
  });
}

// ─── Render saved phase content ───────────────────────
function renderSavedPhase(phaseId,entry){
  const area=document.getElementById('phaseArea');
  if(phaseId==='preQuiz'||phaseId==='quiz'){
    if(!entry.parsed){area.innerHTML=`<div class="card"><div class="prose">${esc(entry.raw)}</div></div>`;return;}
    const hasExplanations=entry.parsed[0]?.explanation;
    renderQuizInteractive(area,entry.parsed,phaseId,hasExplanations);
  }else if(phaseId==='summary'){
    area.innerHTML=`<div class="card"><div class="out-header"><div class="out-title">📖 Zusammenfassung</div><span class="save-indicator">${entry.savedAt}</span></div><div class="prose">${esc(entry.raw)}</div></div>
      <div class="btn-row"><button class="btn-acc" onclick="nextPhase()">Weiter zu Karteikarten →</button></div>`;
  }else if(phaseId==='flashcards'){
    if(!entry.parsed){area.innerHTML=`<div class="card"><div class="prose">${esc(entry.raw)}</div></div>`;return;}
    startFlashcardSR(area,entry.parsed);
  }else if(phaseId==='explain'){
    renderExplainFeedback(area,entry);
  }
}

// ─── Flashcard SR with input ──────────────────────────
function startFlashcardSR(container,cards){
  fcCards=[...cards];fcIdx=0;fcAgain=[];
  renderFcCard(container);
}

function renderFcCard(container){
  if(fcIdx>=fcCards.length){

      <button class="fc-reveal-btn" onclick="revealFc('${cid}','${esc(card.back).replace(/'/g,'\\&#39;')}')">Antwort aufdecken</button>
      <div class="fc-back" id="fc-back-${cid}">${esc(card.back)}</div>

function revealFc(cid,back){
  document.getElementById('fc-back-'+cid).style.display='block';

function fcAnswer(knew,cid){
  if(!knew)fcAgain.push(fcCards[fcIdx]);
  fcIdx++;

  const container=el?.closest('#phaseArea')||el?.closest('.saved-entry-body');

// ─── Quiz interactive ─────────────────────────────────
function renderQuizInteractive(container,questions,phaseId,hasExplanations){
  const qid='q'+Math.random().toString(36).slice(2,7);
  window[qid]={qs:questions,idx:0,wrong:[],score:0,phase:phaseId};
  window[qid+'_render']=function(){
    const st=window[qid];
    if(st.idx>=st.qs.length){renderQuizResult(container,st,qid);return;}
    const q=st.qs[st.idx];
    const opts=q.options.map((o,i)=>`<button class="quiz-opt" onclick="${qid}_ans(${i})" id="${qid}o${i}">${esc(o)}</button>`).join('');
    container.innerHTML=`<div class="card">
      <div class="quiz-prog">${st.phase==='preQuiz'?'Vorwissens-Quiz ':''}Frage ${st.idx+1} von ${st.qs.length}</div>
      <div class="quiz-q">${esc(q.question)}</div>${opts}
    </div>`;
  };
  window[qid+'_ans']=function(chosen){
    const st=window[qid];const q=st.qs[st.idx];
    for(let i=0;i<q.options.length;i++){
      const b=document.getElementById(qid+'o'+i);if(!b)continue;
      b.disabled=true;
      if(i===q.correct)b.className='quiz-opt correct';
      else if(i===chosen)b.className='quiz-opt wrong';
    }
    if(chosen===q.correct)st.score++;else st.wrong.push(st.idx);
    const card=container.querySelector('.card');
    if(q.explanation){
      const exp=document.createElement('div');
      exp.style.cssText='margin-top:10px;padding:10px;background:rgba(217,119,6,.07);border-radius:var(--rsm);font-size:13px;color:var(--text2);line-height:1.5;border-left:3px solid var(--accent)';
      exp.textContent=q.explanation;card.appendChild(exp);
    }
    const nav=document.createElement('div');nav.className='quiz-nav';
    if(st.idx<st.qs.length-1)nav.innerHTML=`<button onclick="${qid}_idx_inc()">Nächste →</button>`;
    else nav.innerHTML=`<button onclick="${qid}_idx_inc()">Auswertung →</button>`;
    card.appendChild(nav);
  };
  window[qid+'_idx_inc']=function(){window[qid].idx++;window[qid+'_render']();};
  window[qid+'_render']();
}

function renderQuizResult(container,st,qid){
  const pct=Math.round((st.score/st.qs.length)*100);
  const color=pct>=80?'var(--green)':pct>=50?'var(--accent)':'var(--red)';
  const wrongQs=st.wrong.map(i=>st.qs[i]);
  let wrongHtml='';
  if(wrongQs.length>0){
    wrongHtml='<div style="margin-bottom:14px"><div class="sec-title" style="margin-bottom:8px">Falsch beantwortet</div>';
    wrongQs.forEach(q=>{
      wrongHtml+=`<div style="margin-bottom:8px;padding:10px;background:var(--bg3);border-radius:var(--rsm);border-left:3px solid var(--red)">
        <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px">${esc(q.question)}</div>
        <div style="font-size:12px;color:var(--green)">✓ ${esc(q.options[q.correct])}</div>
        ${q.explanation?`<div style="font-size:12px;color:var(--text3);margin-top:4px">${esc(q.explanation)}</div>`:''}
      </div>`;
    });
    wrongHtml+='</div>';
  }
  const isPreQuiz=st.phase==='preQuiz';
  container.innerHTML=`<div class="card">
    <div class="quiz-result">
      <div class="quiz-score" style="color:${color}">${pct}%</div>
      <div class="quiz-score-sub">${st.score} von ${st.qs.length} richtig${isPreQuiz?' – kein Stress, das war der Ausgangspunkt!':''}</div>
    </div>
    ${wrongHtml}
    <div class="btn-row">
      <button class="btn-sec" id="${qid}retry">↺ Nochmal</button>
      ${wrongQs.length>0?`<button class="btn-red" id="${qid}wrong">Nur Falsche (${wrongQs.length})</button>`:''}
    </div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn-acc" onclick="nextPhase()" style="flex:1">${isPreQuiz?'Weiter zur Zusammenfassung →':'Weiter →'}</button>
    </div>
  </div>`;
  document.getElementById(qid+'retry').onclick=()=>{window[qid]={qs:st.qs,idx:0,wrong:[],score:0,phase:st.phase};window[qid+'_render']();};
  const wb=document.getElementById(qid+'wrong');
  if(wb)wb.onclick=()=>{window[qid]={qs:wrongQs,idx:0,wrong:[],score:0,phase:st.phase};window[qid+'_render']();};
}

// ─── Saved view ───────────────────────────────────────
function renderSaved(){
  const s=document.getElementById('screen');
  const allKeys=Object.keys(saved);

    const bws=books.filter(b=>allKeys.some(k=>k.startsWith(b.id+'_')));

    let html=`<div class="app-header"><div class="logo">Learn<span>Book</span></div></div><div class="sec-title">Buch wählen</div>`;
    bws.forEach(b=>{
      const cnt=allKeys.filter(k=>k.startsWith(b.id+'_')).length;
      html+=`<div class="book-row" onclick="savedViewBook='${b.id}';savedViewChap=null;renderSaved()">
        <div class="book-spine" style="background:linear-gradient(135deg,${b.color[0]},${b.color[1]})">
          <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </div>
        <div class="book-row-info"><div class="book-row-title">${esc(b.title)}</div><div class="book-row-meta">${cnt} gespeicherte Inhalte</div></div>
        <span style="font-size:18px;color:var(--text3)">›</span>
      </div>`;
    });
    s.innerHTML=html;return;
  }
  const book=books.find(b=>b.id===savedViewBook);
  if(!book){savedViewBook=null;renderSaved();return;}
  const pfx=book.id+'_';
  const getCI=k=>parseInt(k.slice(pfx.length).split('_')[0]);
  if(savedViewChap===null){
    const ck=allKeys.filter(k=>k.startsWith(pfx));
    const cis=[...new Set(ck.map(k=>getCI(k)).filter(n=>!isNaN(n)))].sort((a,b)=>a-b);
    let html=`<div class="app-header"><div class="logo">Learn<span>Book</span></div><button class="hdr-btn" onclick="savedViewBook=null;renderSaved()">← Zurück</button></div>
      <div class="card-sm" style="border-left:3px solid ${book.color[0]};margin-bottom:14px"><div style="font-size:11px;color:var(--text3)">Gespeicherte Inhalte</div><div style="font-size:14px;font-weight:500">${esc(book.title)}</div></div>
      <div class="sec-title">Kapitel wählen</div>`;
    cis.forEach(ci=>{
      const ch=book.chapters[ci];const cnt=ck.filter(k=>getCI(k)===ci).length;
      html+=`<div class="chap-item" onclick="savedViewChap=${ci};renderSaved()">
        <span class="chap-num">${ci+1}</span><span class="chap-title">${esc(ch?.title||'Kapitel '+(ci+1))}</span>
        <span class="chap-prog">${cnt} Inhalt${cnt>1?'e':''}</span>
      </div>`;
    });
    s.innerHTML=html;return;
  }
  const ci=savedViewChap;const ch=book.chapters[ci];
  const entries=allKeys.filter(k=>k.startsWith(pfx+ci+'_'))
    .map(k=>({k,tool:saved[k]?.type||'',entry:saved[k]})).filter(e=>e.tool)
    .sort((a,b)=>PHASES.findIndex(p=>p.id===a.tool)-PHASES.findIndex(p=>p.id===b.tool));
  const fcEntries=entries.filter(e=>e.tool==='flashcards'&&e.entry?.parsed);
  let html=`<div class="app-header"><div class="logo">Learn<span>Book</span></div><button class="hdr-btn" onclick="savedViewChap=null;renderSaved()">← Zurück</button></div>
    <div class="card-sm" style="border-left:3px solid ${book.color[0]};margin-bottom:14px">
      <div style="font-size:11px;color:var(--text3)">${esc(book.title)} · Kapitel ${ci+1}</div>
      <div style="font-size:14px;font-weight:500">${esc(ch?.title||'')}</div>
    </div>`;
  if(fcEntries.length>0)html+=`<button class="btn-sec" style="width:100%;margin-bottom:12px" onclick="exportQuizlet(${ci})">⬇ Als Quizlet-CSV exportieren</button>`;
  const phaseLabels={preQuiz:'🔍 Vorwissens-Quiz',summary:'📖 Zusammenfassung',flashcards:'🃏 Karteikarten',quiz:'❓ Quiz',explain:'✍️ Erklärung + Feedback'};
  entries.forEach(({k,tool,entry})=>{
    const label=phaseLabels[tool]||tool;
    const eid='se_'+k.replace(/_/g,'X');
    html+=`<div class="saved-entry">
      <div class="saved-entry-hdr" onclick="toggleSaved('${eid}','${k}')">

        <button class="saved-del" onclick="delSaved(event,'${k}')">✕</button>
      </div>
      <div class="saved-entry-body" id="${eid}"></div>
    </div>`;
  });
  s.innerHTML=html;
}

function toggleSaved(id,key){
  const el=document.getElementById(id);
  const open=el.classList.toggle('open');
  if(open&&el.dataset.rendered!=='1'){
    const entry=saved[key];if(!entry)return;
    renderEntryInto(el,entry);
    el.dataset.rendered='1';
  }
}
function renderEntryInto(container,entry){
  if(entry.type==='summary'){container.innerHTML=`<div class="prose">${esc(entry.raw)}</div>`;return;}
  if(entry.type==='preQuiz'||entry.type==='quiz'){
    if(!entry.parsed){container.innerHTML=`<div class="prose">${esc(entry.raw)}</div>`;return;}
    renderQuizInteractive(container,entry.parsed,entry.type,!!entry.parsed[0]?.explanation);return;
  }
  if(entry.type==='flashcards'){
    if(!entry.parsed){container.innerHTML=`<div class="prose">${esc(entry.raw)}</div>`;return;}
    startFlashcardSR(container,entry.parsed);return;
  }
  if(entry.type==='explain'){renderExplainFeedback(container,entry);return;}
  if(entry.type==='terms'){
    if(!entry.parsed){container.innerHTML=`<div class="prose">${esc(entry.raw)}</div>`;return;}
    container.innerHTML=entry.parsed.map(t=>`<div class="term"><div class="term-name">${esc(t.term)}</div><div class="term-def">${esc(t.definition)}</div></div>`).join('');return;
  }
  if(entry.type==='timeline'){
    if(!entry.parsed){container.innerHTML=`<div class="prose">${esc(entry.raw)}</div>`;return;}
    container.innerHTML=entry.parsed.map((ev,i)=>`<div class="tl-item"><div class="tl-dot-col"><div class="tl-dot"></div>${i<entry.parsed.length-1?'<div class="tl-line"></div>':''}</div><div><div class="tl-date">${esc(ev.date)}</div><div class="tl-event">${esc(ev.event)}</div></div></div>`).join('');return;
  }
  container.innerHTML=`<div class="prose">${esc(entry.raw)}</div>`;
}
function delSaved(e,k){e.stopPropagation();delete saved[k];saveState();renderSaved();}

// ─── Export ───────────────────────────────────────────
function exportQuizlet(ci){
  const keys=Object.keys(saved).filter(k=>k.startsWith(savedViewBook+'_'+ci+'_flashcards'));
  const cards=[];keys.forEach(k=>{const e=saved[k];if(e?.parsed)e.parsed.forEach(c=>cards.push(c));});
  if(!cards.length){alert('Keine Karteikarten gefunden.');return;}
  const csv=cards.map(c=>'"'+c.front.replace(/"/g,'""')+'"\t"'+c.back.replace(/"/g,'""')+'"').join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/plain;charset=utf-8'}));
  const ch=books.find(b=>b.id===savedViewBook)?.chapters[ci];
  a.download=(ch?.title||'karten').slice(0,30).replace(/[^a-z0-9]/gi,'_')+'_quizlet.txt';
  a.click();
}

// ─── ePub loading ─────────────────────────────────────
async function loadEpubs(event){
  const files=Array.from(event.target.files);if(!files.length)return;
  const s=document.getElementById('screen');
  s.innerHTML=`<div class="app-header"><div class="logo">Learn<span>Book</span></div></div><div class="loading-wrap"><div class="dots"><span></span><span></span><span></span></div><div class="loading-txt">${files.length>1?files.length+' Bücher':'Buch'} wird geladen…</div></div>`;
  for(const file of files){
    try{
      const zip=await JSZip.loadAsync(file);
      const opfPath=await findOpf(zip);if(!opfPath)continue;
      const opfText=await zip.file(opfPath).async('text');
      const parser=new DOMParser();
      const opfDoc=parser.parseFromString(opfText,'application/xml');
      const te=opfDoc.querySelector('metadata title,metadata > *|title');
      const ae=opfDoc.querySelector('metadata creator,metadata > *|creator');
      const title=te?te.textContent.trim():file.name.replace('.epub','');
      const author=ae?ae.textContent.trim():'';
      const opfDir=opfPath.includes('/')?opfPath.substring(0,opfPath.lastIndexOf('/')+1):'';
      const manifest={};
      opfDoc.querySelectorAll('manifest item').forEach(item=>{manifest[item.getAttribute('id')]={href:item.getAttribute('href'),type:item.getAttribute('media-type')};});
      const chapters=[];let idx=0;
      for(const ir of opfDoc.querySelectorAll('spine itemref')){
        const item=manifest[ir.getAttribute('idref')];
        if(!item||!item.type?.includes('html'))continue;
        const path=opfDir+item.href;
        const entry=zip.file(path)||zip.file(decodeURIComponent(path));if(!entry)continue;
        const html=await entry.async('text');
        const doc=parser.parseFromString(html,'text/html');
        const body=doc.body.textContent||'';
        const trimmed=body.replace(/\s+/g,' ').trim();if(trimmed.length<80)continue;
        const h=doc.querySelector('h1,h2,h3');
        let ct=h?h.textContent.trim():`Kapitel ${++idx}`;
        if(ct.length>70)ct=ct.slice(0,67)+'…';
        chapters.push({title:ct,text:trimmed,words:Math.round(trimmed.split(' ').length)});
      }
      if(!chapters.length)continue;
      const [c1,c2]=COLORS[colorIdx%COLORS.length];colorIdx++;
      const id='book_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
      books.push({id,title,author,color:[c1,c2],chapters});
      if(!activeBookId)activeBookId=id;
    }catch(e){console.error(e);}
  }
  saveState();event.target.value='';nav('library');
}
async function findOpf(zip){
  const c=zip.file('META-INF/container.xml');
  if(c){const xml=await c.async('text');const m=xml.match(/full-path="([^"]+\.opf)"/);if(m)return m[1];}
  return Object.keys(zip.files).find(f=>f.endsWith('.opf'))||null;
}

// ─── API helper ───────────────────────────────────────
async function callAPI(key,prompt){
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2500,messages:[{role:'user',content:prompt}]})
  });
  if(!resp.ok){const e=await resp.json();throw new Error(e.error?.message||'HTTP '+resp.status);}
  const data=await resp.json();
  return data.content[0].text;
}

// ─── Helpers ──────────────────────────────────────────
function changeCount(type,d){
  const min=type==='quiz'?3:4,max=type==='quiz'?20:30;
  countSetting[type]=Math.min(max,Math.max(min,countSetting[type]+d));
  const el=document.getElementById(type==='quiz'?'qCount':'fcCount');if(el)el.textContent=countSetting[type];
}
function extractJson(text){
  const m=text.match(/```json\s*([\s\S]*?)```/)||text.match(/```\s*([\s\S]*?)```/)||text.match(/(\[[\s\S]*\])/);
  return m?m[1].trim():text.trim();
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function isIOS(){return /iPad|iPhone|iPod/.test(navigator.userAgent);}
function emptyState(h,p){return `<div class="app-header"><div class="logo">Learn<span>Book</span></div></div><div class="empty-state"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg><h3>${h}</h3><p>${p}</p></div>`;}
